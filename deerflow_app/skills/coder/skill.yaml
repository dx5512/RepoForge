name: coder
description: Code Modification Expert - Precise changes with reflection loop
version: "1.0"

constraints:
  require_task_id: true
  require_full_read_before_write: true
  require_test_after_write: true
  max_reflection_loops: 3

reflection_loop:
  steps:
    - modify
    - test
    - analyze_error
    - remodify

tools:
  allowed:
    - file_read
    - file_write
    - bash_execute
  forbidden:
    - worktree_create
    - worktree_remove

test_requirements:
  run_pytest: true
  require_all_pass: true
  max_retries: 3
