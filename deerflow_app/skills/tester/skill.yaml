name: tester
description: Test Verification Expert - pytest execution and failure analysis
version: "1.0"

constraints:
  require_task_id: true
  require_full_test_suite: true
  extract_failure_logs: true

tools:
  allowed:
    - bash_execute
  forbidden:
    - file_write
    - worktree_create
    - worktree_remove

test_commands:
  primary: pytest {path} -v --tb=short
  fallback: pytest {path} -x --tb=long
  regression: pytest tests/ -v

failure_analysis:
  extract_stack_trace: true
  identify_failing_line: true
  suggest_fix: false
