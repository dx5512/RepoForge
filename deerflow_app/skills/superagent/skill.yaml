name: superagent
description: Task Orchestration Lead - Intent recognition, task decomposition, Sub-agent spawning
version: "1.0"

capabilities:
  - intent_recognition
  - task_decomposition
  - subagent_spawning
  - workflow_coordination

subagents:
  researcher:
    skill: researcher
    spawn_on: analysis_required
    quantity: 1

  coder:
    skill: coder
    spawn_on: modification_required
    quantity: 1

  tester:
    skill: tester
    spawn_on: verification_required
    quantity: 1

workflow:
  sequence:
    - researcher
    - coder
    - tester
  parallel_allowed: false

task_binding:
  require_task_id: true
  bind_worktree: true
